<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </linearGradient>
    <linearGradient id="gradientZ" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="256" height="256" fill="url(#bg)" rx="56" />
  <rect width="256" height="256" fill="none" stroke="#1e293b" stroke-width="4" rx="56" />

  <g filter="url(#glow)">
    <path d="M76 80 L180 80 L76 176 L180 176" 
          fill="none" 
          stroke="url(#gradientZ)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
    
    <!-- Accent indicator for growth -->
    <circle cx="180" cy="80" r="18" fill="#c084fc" />
  </g>
</svg>